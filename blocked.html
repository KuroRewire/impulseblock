<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseBlock</title>
  <style>
    /* ===== bundled fonts (local woff2 — MV3 CSP blocks remote font CSS) ===== */
    @font-face { font-family: 'Archivo'; font-style: normal; font-weight: 400; font-display: swap; src: url('assets/fonts/archivo-400.woff2') format('woff2'); }
    @font-face { font-family: 'Archivo'; font-style: normal; font-weight: 700; font-display: swap; src: url('assets/fonts/archivo-700.woff2') format('woff2'); }
    @font-face { font-family: 'Archivo'; font-style: normal; font-weight: 800; font-display: swap; src: url('assets/fonts/archivo-800.woff2') format('woff2'); }
    /* Archivo Narrow tops out at 700 on Google Fonts/fontsource; map 700–800 to the real 700 face. */
    @font-face { font-family: 'Archivo Narrow'; font-style: normal; font-weight: 700 800; font-display: swap; src: url('assets/fonts/archivo-narrow-700.woff2') format('woff2'); }
    @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400; font-display: swap; src: url('assets/fonts/space-grotesk-400.woff2') format('woff2'); }
    @font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 500; font-display: swap; src: url('assets/fonts/space-grotesk-500.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('assets/fonts/jetbrains-mono-400.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url('assets/fonts/jetbrains-mono-700.woff2') format('woff2'); }
    @font-face { font-family: 'Fraunces'; font-style: italic; font-weight: 400; font-display: swap; src: url('assets/fonts/fraunces-400-italic.woff2') format('woff2'); }
    @font-face { font-family: 'Fraunces'; font-style: normal; font-weight: 500; font-display: swap; src: url('assets/fonts/fraunces-500.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('assets/fonts/inter-400.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('assets/fonts/inter-500.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; font-display: swap; src: url('assets/fonts/inter-600.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 700; font-display: swap; src: url('assets/fonts/inter-700.woff2') format('woff2'); }
    @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 700; font-display: swap; src: url('assets/fonts/nunito-700.woff2') format('woff2'); }
    @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 800; font-display: swap; src: url('assets/fonts/nunito-800.woff2') format('woff2'); }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== shared screen shell ===== */
    .screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 48px 24px;
      position: relative; overflow: hidden;
    }
    .layout { width: 100%; position: relative; z-index: 1; }

    /* structural pieces — themes restyle these, blocked.js keeps the ids */
    .domain-chip { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .headline { margin: 0; }
    .sub { margin: 0; }
    .cheer {
      aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .cheer img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .insight { margin: 0; }
    .actions { display: flex; gap: 14px; }
    .btn { cursor: pointer; border: none; font-family: inherit; transition: all .15s ease; }

    /* ===== per-theme column grid (each theme sets columns + grid-template-areas below) =====
       Zones are placed by name. .data-col groups the right-hand zones into one column for the
       2-col themes (flex) and dissolves for the 3-col themes (display:contents) so each of its
       zones becomes its own independent grid column. blocked.js finds ids by getElementById,
       so moving zones around the DOM/grid is safe. */
    .grid { width: 100%; }
    .zone { min-width: 0; }
    .spine-col { grid-area: spinecol; display: flex; flex-direction: column; }
    .zone-head { grid-area: head; }
    .zone-spine { grid-area: spine; }
    .data-col { grid-area: datacol; display: flex; flex-direction: column; gap: 16px; }
    .zone-chip { grid-area: chip; }
    .rightcol { grid-area: rightcol; display: flex; flex-direction: column; gap: 16px; }
    .zone-stats { grid-area: stats; }
    .zone-log { grid-area: log; }
    .zone-blocked { grid-area: blocked; }
    .zone-stats, .zone-log, .zone-blocked { text-align: left; }
    /* TASK 2: 3-col headline sits in a full-width centered top row — keep it on one line. */
    body[data-theme="minimal"] .headline, body[data-theme="calm"] .headline, body[data-theme="zen"] .headline { white-space: nowrap; }
    /* 3-col themes: dissolve .spine-col so zone-head (spanning top) and zone-spine (center column)
       become independent grid items placed by the "head"/"spine" areas. */
    body[data-theme="minimal"] .spine-col, body[data-theme="calm"] .spine-col, body[data-theme="zen"] .spine-col { display: contents; }

    /* ▼ details (review data) — shared base, theme-tinted */
    .details { margin-top: 18px; width: 100%; }
    .details > summary {
      list-style: none; cursor: pointer; user-select: none;
      font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
      opacity: 0.7;
    }
    .details > summary::-webkit-details-marker { display: none; }
    .details > summary::before { content: '▸'; font-size: 10px; transition: transform .15s ease; }
    .details[open] > summary::before { transform: rotate(90deg); }
    .details-body { margin-top: 14px; text-align: left; }

    /* stats text (today-count / last-opened) */
    .stats p { margin: 0; }

    /* 7-day history rows (blocked.js renders into #history-list) */
    .history-title { margin: 0 0 6px 0; font-size: 13px; opacity: 0.8; }
    #history-list { margin: 4px 0 14px; }
    .history-row { display: flex; align-items: center; margin: 3px 0; min-width: 0; }
    .history-date { flex: 0 0 auto; width: 3rem; font-size: 11px; opacity: 0.7; }
    .history-bar { flex: 1 1 auto; min-width: 0; margin: 0 6px; border-radius: 4px; overflow: hidden; height: 7px; }
    .history-bar-fill { height: 100%; }
    .history-count { flex: 0 0 auto; min-width: 1.5rem; text-align: right; font-size: 11px; opacity: 0.85; }

    /* bursts + blocked list inside details */
    #bursts-list, #blocked-list { font-size: 12px; margin-top: 4px; }
    .blocked-item { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; }
    .blocked-host { flex: 1; margin-right: 6px; word-break: break-all; }
    .btn-small { padding: 2px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; }

    /* incognito — tucked at very bottom, quiet */
    .incognito { margin-top: 40px; font-size: 13px; opacity: 0.7; max-width: 460px; text-align: left; }
    .incognito h2 { font-size: 13px; margin: 0 0 6px 0; font-weight: 600; }
    .incognito ol { margin: 0; padding-left: 18px; }
    .incognito a { color: inherit; }

    /* ============================================================= */
    /* THEME: BOLD                                                    */
    /* ============================================================= */
    body[data-theme="bold"] .screen { background: #fafaf8; color: #0a0a0a; justify-content: flex-start; padding: 56px clamp(28px,6vw,80px); }
    body[data-theme="bold"] .layout { max-width: 1100px; margin: 0 auto; }
    body[data-theme="bold"] .top-rule { display: flex; justify-content: space-between; align-items: center; font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: 2px solid #0a0a0a; padding-bottom: 10px; margin-bottom: 36px; }
    body[data-theme="bold"] .top-rule .accent-dot { width: 9px; height: 9px; border-radius: 50%; background: #e8482b; display: inline-block; margin-right: 7px; vertical-align: middle; }
    /* 2 columns: LEFT spine (headline → image → buttons), RIGHT data (host, stats, log, blocked) */
    body[data-theme="bold"] .grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 30px 44px; grid-template-areas: "spinecol datacol"; align-items: stretch; }
    body[data-theme="bold"] .data-col { gap: 22px; }
    /* left column fills the row height; image sits up top, buttons pin to the bottom edge
       so they line up with the bottom of the right column's block list */
    body[data-theme="bold"] .zone-spine { display: flex; flex-direction: column; flex: 1 1 auto; }
    body[data-theme="bold"] .headline { font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: clamp(44px,7.5vw,88px); line-height: 0.92; letter-spacing: -0.02em; text-transform: uppercase; max-width: 6.6em; }
    body[data-theme="bold"] .headline .q { color: #e8482b; }
    /* TASK 4: force the JA headline to break 本当に / 開きますか? without touching the i18n string.
       A 1-line-tall float on the right shrinks line 1 to ~3.3em (fits 本当に, not 開), and clears
       before line 2 so 開きますか? sits on one full-width line. EN wraps raggedly but cleanly. */
    body[data-theme="bold"] .headline::before { content: ""; float: right; width: 3.3em; height: 0.8em; }
    body[data-theme="bold"] .domain-chip { font-family: 'Archivo', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 18px; }
    body[data-theme="bold"] .domain-chip .dot { background: #e8482b; width: 8px; height: 8px; }
    body[data-theme="bold"] .sub { font-family: 'Archivo', sans-serif; font-size: 17px; line-height: 1.4; color: #333; max-width: 280px; }
    body[data-theme="bold"] .cheer { width: 100%; max-width: 280px; margin: 24px 0 0; background: #ececec; border: 2px solid #0a0a0a; }
    body[data-theme="bold"] .insight { font-family: 'Archivo', sans-serif; font-size: 14px; color: #888; margin-top: 14px; }
    body[data-theme="bold"] .details > summary { font-family: 'Archivo', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #0a0a0a; opacity: 1; }
    body[data-theme="bold"] .history-bar { background: #e0e0e0; }
    body[data-theme="bold"] .history-bar-fill { background: #0a0a0a; }
    body[data-theme="bold"] .actions { margin-top: auto; gap: 0; border-top: 2px solid #0a0a0a; }
    /* POLISH: smaller font + tighter side padding helps long JA labels (e.g. 今日は十分見ました)
       fit; wrapping stays enabled so they wrap cleanly inside the button instead of overflowing. */
    body[data-theme="bold"] .btn { flex: 1; background: #fafaf8; color: #0a0a0a; font-family: 'Archivo Narrow', sans-serif; font-weight: 800; text-transform: uppercase; font-size: clamp(16px,2.4vw,26px); line-height: 1.1; padding: 22px 18px; text-align: left; }
    body[data-theme="bold"] .btn + .btn { border-left: 2px solid #0a0a0a; }
    /* TASK 5: filled at rest so they clearly read as buttons (editorial black + red). */
    body[data-theme="bold"] #btn-yes { background: #e8482b; color: #fff; }
    body[data-theme="bold"] #btn-yes:hover { background: #c93b20; }
    body[data-theme="bold"] #btn-no { background: #0a0a0a; color: #fafaf8; }
    body[data-theme="bold"] #btn-no:hover { background: #e8482b; color: #fff; }
    body[data-theme="bold"] .stats { margin-top: 2px; }

    /* ============================================================= */
    /* THEME: FOCUS                                                   */
    /* ============================================================= */
    body[data-theme="focus"] .screen { background: #0a0c10; color: #cdd6e4; justify-content: flex-start; padding: 40px clamp(28px,5vw,64px); font-family: 'JetBrains Mono', monospace; }
    body[data-theme="focus"] .layout { max-width: 1080px; margin: 0 auto; }
    /* 2 columns: LEFT spine (headline → image → buttons), RIGHT data (host, stats, log, blocked) */
    body[data-theme="focus"] .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 28px 40px; grid-template-areas: "spinecol datacol"; align-items: stretch; margin-top: 36px; }
    body[data-theme="focus"] .data-col { gap: 20px; }
    /* left column fills the row; image up top, buttons pinned to the bottom edge */
    body[data-theme="focus"] .zone-spine { display: flex; flex-direction: column; flex: 1 1 auto; }
    body[data-theme="focus"] .top-rule { display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #5b6677; border-bottom: 1px solid #1c2330; padding-bottom: 14px; margin-bottom: 0; }
    body[data-theme="focus"] .top-rule .accent-dot { color: #3d7dff; }
    body[data-theme="focus"] .top-rule .accent-dot .dot { background: #3d7dff; box-shadow: 0 0 8px #3d7dff; }
    body[data-theme="focus"] .hero { padding: 56px 0 0; position: relative; }
    body[data-theme="focus"] .bracket { position: relative; display: inline-block; padding: 18px 26px; }
    body[data-theme="focus"] .bracket::before, body[data-theme="focus"] .bracket::after { content: ''; position: absolute; width: 16px; height: 16px; border: 2px solid #3d7dff; }
    body[data-theme="focus"] .bracket::before { top: 0; left: 0; border-right: none; border-bottom: none; }
    body[data-theme="focus"] .bracket::after { bottom: 0; right: 0; border-left: none; border-top: none; }
    body[data-theme="focus"] .headline { font-family: 'JetBrains Mono', monospace; font-size: clamp(24px,5vw,48px); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #3d7dff; text-shadow: 0 0 24px rgba(61,125,255,0.35); }
    body[data-theme="focus"] .domain-chip { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #5b6677; margin-top: 20px; }
    body[data-theme="focus"] .domain-chip .dot { background: #3d7dff; }
    body[data-theme="focus"] .sub { font-family: 'JetBrains Mono', monospace; font-size: clamp(13px,1.6vw,16px); color: #8a96a8; margin-top: 18px; line-height: 1.7; }
    body[data-theme="focus"] .cheer { width: 340px; max-width: 100%; margin: 26px 0 0; border-radius: 4px; background: #0e131b; border: 1px solid #1f2836; }
    body[data-theme="focus"] .insight { font-family: 'JetBrains Mono', monospace; color: #5b6677; font-size: 13px; margin-top: 16px; }
    body[data-theme="focus"] .details > summary { font-family: 'JetBrains Mono', monospace; color: #3d7dff; text-transform: uppercase; letter-spacing: 0.06em; }
    body[data-theme="focus"] .history-title, body[data-theme="focus"] .stats { font-family: 'JetBrains Mono', monospace; }
    body[data-theme="focus"] .history-bar { background: #1c2330; }
    body[data-theme="focus"] .history-bar-fill { background: #3d7dff; }
    body[data-theme="focus"] .actions { margin-top: auto; gap: 16px; }
    body[data-theme="focus"] .btn { flex: 1; background: transparent; color: #cdd6e4; border: 1px solid #28323f; font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; padding: 18px 22px; text-align: left; }
    body[data-theme="focus"] #btn-no { border-color: #3d7dff; color: #3d7dff; }
    body[data-theme="focus"] #btn-no:hover { background: rgba(61,125,255,0.1); }
    body[data-theme="focus"] #btn-yes:hover { border-color: #5b6677; color: #fff; }

    /* ============================================================= */
    /* THEME: CALM                                                    */
    /* ============================================================= */
    body[data-theme="calm"] .screen { background: radial-gradient(120% 120% at 50% 0%, #fff5ec 0%, #fdeee2 45%, #f7e7e0 100%); color: #4a3f3a; font-family: 'Nunito', sans-serif; }
    body[data-theme="calm"] .layout { max-width: 1040px; margin: 0 auto; text-align: center; }
    /* 3 columns: LEFT blocked list, CENTER spine (host → headline → image → buttons), RIGHT stats + log */
    /* FIX 1: Calm gets an extra "char" row between chip and head for the mascot (minimal/zen keep
       the plain template). This moves the character out of the center column → 3 columns balance. */
    body[data-theme="calm"] .grid { display: grid; grid-template-columns: 0.9fr 1.2fr 0.9fr; gap: 20px 34px; grid-template-areas: "chip chip chip" "char char char" "head head head" "blocked spine rightcol"; align-items: start; }
    body[data-theme="calm"] .data-col { display: contents; }
    body[data-theme="calm"] .top-rule { display: none; }
    body[data-theme="calm"] .domain-chip { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: #b08968; margin-bottom: 18px; justify-content: center; }
    body[data-theme="calm"] .domain-chip .dot { background: #ff9f5a; }
    body[data-theme="calm"] .headline { font-family: 'Nunito', sans-serif; font-size: clamp(38px,7vw,60px); font-weight: 800; letter-spacing: -0.02em; color: #3a2f2a; }
    body[data-theme="calm"] .headline .q { color: #ff8a4c; }
    body[data-theme="calm"] .sub { font-family: 'Nunito', sans-serif; font-size: clamp(15px,2.4vw,19px); color: #8a766c; margin-top: 14px; font-weight: 600; }
    body[data-theme="calm"] .cheer { width: 100%; max-width: 250px; margin: 20px auto 0; border-radius: 28px; background: #fff; border: 1px solid rgba(180,140,110,0.18); box-shadow: 0 18px 50px rgba(180,120,80,0.14); }
    /* TASK 2: Calm mascot above the image. Hidden in every other theme. The PNG is NOT
       transparent, so a circular crop (border-radius:50% clips the replaced image) hides its
       square background; a white ring + soft shadow sits it cleanly on the warm gradient. */
    .calm-character { display: none; }
    /* FIX 1: the PNG has transparency, so a solid warm fill (matching Calm's peach gradient)
       shows behind the character instead of the transparent checkerboard. */
    body[data-theme="calm"] .calm-character { display: block; grid-area: char; width: 104px; height: 104px; margin: 0 auto; border-radius: 50%; object-fit: cover; background: #ffe7d4; border: 3px solid #fff; box-shadow: 0 8px 22px rgba(255,126,84,0.22); }
    body[data-theme="calm"] .insight { font-family: 'Nunito', sans-serif; font-size: 15px; color: #a8928a; margin-top: 0; font-weight: 600; }
    body[data-theme="calm"] .details { text-align: left; }
    body[data-theme="calm"] .details > summary { font-family: 'Nunito', sans-serif; font-weight: 700; color: #b08968; justify-content: center; }
    body[data-theme="calm"] .history-bar { background: #f0e0d4; }
    body[data-theme="calm"] .history-bar-fill { background: #ff9f5a; }
    body[data-theme="calm"] .actions { margin-top: 28px; justify-content: center; }
    body[data-theme="calm"] .btn { border-radius: 999px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; padding: 16px 30px; display: inline-flex; align-items: center; gap: 8px; }
    body[data-theme="calm"] #btn-yes { background: #fff; color: #6a564c; border: 1.5px solid #e6d3c6; }
    body[data-theme="calm"] #btn-yes:hover { background: #fbf2ec; }
    body[data-theme="calm"] #btn-no { background: linear-gradient(135deg, #ff9f5a, #ff7e54); color: #fff; box-shadow: 0 10px 24px rgba(255,126,84,0.34); }
    body[data-theme="calm"] #btn-no:hover { filter: brightness(1.05); }

    /* ============================================================= */
    /* THEME: MINIMAL                                                 */
    /* ============================================================= */
    body[data-theme="minimal"] .screen { background: #fff; color: #1a1a1a; font-family: 'Space Grotesk', sans-serif; }
    body[data-theme="minimal"] .layout { max-width: 1040px; margin: 0 auto; text-align: center; }
    /* 3 columns: LEFT blocked list, CENTER spine (host → headline → image → buttons), RIGHT stats + log */
    body[data-theme="minimal"] .grid { display: grid; grid-template-columns: 0.9fr 1.2fr 0.9fr; gap: 20px 34px; grid-template-areas: "chip chip chip" "head head head" "blocked spine rightcol"; align-items: start; }
    body[data-theme="minimal"] .data-col { display: contents; }
    body[data-theme="minimal"] .top-rule { display: none; }
    body[data-theme="minimal"] .domain-chip { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; color: #9a9a9a; margin-bottom: 30px; justify-content: center; }
    body[data-theme="minimal"] .domain-chip .dot { background: #1a1a1a; width: 6px; height: 6px; }
    body[data-theme="minimal"] .headline { font-family: 'Space Grotesk', sans-serif; font-size: clamp(26px,4.4vw,38px); font-weight: 500; letter-spacing: -0.02em; line-height: 1.15; }
    body[data-theme="minimal"] .sub { display: none; }
    body[data-theme="minimal"] .cheer { width: 100%; max-width: 260px; margin: 20px auto; border-radius: 16px; background: #f6f6f6; border: 1px solid #ededed; }
    body[data-theme="minimal"] .insight { font-family: 'Space Grotesk', sans-serif; font-size: 14px; color: #9a9a9a; margin: 0 0 30px; }
    body[data-theme="minimal"] .details { text-align: left; }
    body[data-theme="minimal"] .details > summary { font-family: 'Space Grotesk', sans-serif; color: #888; justify-content: center; }
    body[data-theme="minimal"] .history-bar { background: #eee; }
    body[data-theme="minimal"] .history-bar-fill { background: #4f46e5; }
    /* F2: minimal had no gap below the collapsed <details>; the other themes already
       set 28–40px here. .actions is flex (no margin-collapse), so set it per-theme. */
    body[data-theme="minimal"] .actions { justify-content: center; margin-top: 30px; }
    body[data-theme="minimal"] .btn { border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 500; padding: 13px 26px; }
    body[data-theme="minimal"] #btn-yes { background: #fff; color: #555; border: 1px solid #e2e2e2; }
    body[data-theme="minimal"] #btn-yes:hover { background: #f7f7f7; }
    body[data-theme="minimal"] #btn-no { background: #4f46e5; color: #fff; box-shadow: 0 8px 22px rgba(79,70,229,0.22); }
    body[data-theme="minimal"] #btn-no:hover { background: #4338ca; }

    /* ============================================================= */
    /* THEME: ZEN                                                     */
    /* ============================================================= */
    body[data-theme="zen"] .screen { background: #f5f2ea; color: #2b2622; font-family: 'Fraunces', Georgia, serif; }
    body[data-theme="zen"] .layout { max-width: 1060px; margin: 0 auto; text-align: center; }
    /* 3 columns: LEFT blocked list, CENTER spine (host → headline → image → buttons), RIGHT stats + log */
    body[data-theme="zen"] .grid { display: grid; grid-template-columns: 0.9fr 1.2fr 0.9fr; gap: 20px 34px; grid-template-areas: "chip chip chip" "head head head" "blocked spine rightcol"; align-items: start; }
    body[data-theme="zen"] .data-col { display: contents; }
    /* FIX 2: enso is larger than the 300px image so it peeks around it as a soft backdrop
       (stays behind via z-index:0 < .cheer's z-index:1, and faint at opacity 0.10). */
    body[data-theme="zen"] .enso { position: absolute; top: 46%; left: 50%; width: 540px; height: 540px; transform: translate(-50%,-50%); pointer-events: none; z-index: 0; background-image: url('assets/enso.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.10; }
    body[data-theme="zen"] .top-rule { display: none; }
    body[data-theme="zen"] .domain-chip { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #a89a86; margin-bottom: 30px; justify-content: center; }
    body[data-theme="zen"] .domain-chip .dot { background: #8a7a64; width: 5px; height: 5px; }
    body[data-theme="zen"] .headline { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: clamp(28px,5vw,48px); line-height: 1.28; color: #2b2622; }
    body[data-theme="zen"] .sub { font-family: 'Inter', sans-serif; font-size: clamp(13px,1.8vw,16px); color: #8a7d6c; margin-top: 22px; line-height: 1.7; }
    /* TASK 3: bigger, and lifted in front of the faint enso backdrop (enso is z-index:0). */
    body[data-theme="zen"] .cheer { width: 100%; max-width: 300px; margin: 20px auto 0; border-radius: 14px; background: #efe9dd; border: 1px solid rgba(120,105,80,0.2); position: relative; z-index: 1; }
    body[data-theme="zen"] .insight { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: #9a8d7a; margin-top: 0; }
    body[data-theme="zen"] .details { text-align: left; }
    body[data-theme="zen"] .details > summary { font-family: 'Inter', sans-serif; color: #8a7d6c; justify-content: center; }
    body[data-theme="zen"] .history-title, body[data-theme="zen"] .stats { font-family: 'Inter', sans-serif; }
    body[data-theme="zen"] .history-bar { background: #e6ddcc; }
    body[data-theme="zen"] .history-bar-fill { background: #6a5e4d; }
    body[data-theme="zen"] .actions { margin-top: 32px; justify-content: center; }
    body[data-theme="zen"] .btn { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; padding: 14px 32px; border-radius: 2px; }
    body[data-theme="zen"] #btn-yes { background: transparent; color: #6a5e4d; border: 1px solid #cabfa8; }
    body[data-theme="zen"] #btn-yes:hover { background: rgba(180,165,135,0.12); }
    body[data-theme="zen"] #btn-no { background: #2b2622; color: #f5f2ea; border: 1px solid #2b2622; }
    body[data-theme="zen"] #btn-no:hover { background: #1a1612; }

    /* ===== responsive: stack the columns into one on narrow screens ===== */
    @media (max-width: 960px) {
      body[data-theme="bold"] .grid, body[data-theme="focus"] .grid,
      body[data-theme="minimal"] .grid, body[data-theme="calm"] .grid, body[data-theme="zen"] .grid {
        display: flex; flex-direction: column; gap: 22px; margin-top: 0;
      }
      /* dissolve the column wrappers so every zone stacks in one column (DOM order) */
      body[data-theme="bold"] .spine-col, body[data-theme="focus"] .spine-col,
      body[data-theme="minimal"] .spine-col, body[data-theme="calm"] .spine-col, body[data-theme="zen"] .spine-col,
      body[data-theme="bold"] .data-col, body[data-theme="focus"] .data-col,
      body[data-theme="minimal"] .data-col, body[data-theme="calm"] .data-col, body[data-theme="zen"] .data-col {
        display: contents;
      }
      /* drop the bottom-pin when stacked: natural spacing instead */
      body[data-theme="bold"] .zone-spine, body[data-theme="focus"] .zone-spine { flex: 0 0 auto; }
      body[data-theme="bold"] .actions { margin-top: 26px; }
      body[data-theme="focus"] .actions { margin-top: 24px; }
      /* stacked column is narrow — let the headline wrap again so long (EN) copy isn't clipped */
      body[data-theme="minimal"] .headline, body[data-theme="calm"] .headline, body[data-theme="zen"] .headline { white-space: normal; }
    }
    @media (max-width: 720px) {
      body[data-theme="bold"] .actions { flex-direction: column; }
      body[data-theme="bold"] .btn + .btn { border-left: none; border-top: 2px solid #0a0a0a; }
      .actions { flex-direction: column; }
    }

    /* =====================================================================
       MINIMAL THEME REDESIGN — 2-state pause screen (indigo, breathing).
       Shown ONLY for data-theme="minimal" via the .ib-min container; the
       grid .screen is hidden for minimal but kept in the DOM (ids preserved).
       Every selector is scoped to .ib-min / .ibm-* so no other theme is affected.
       ===================================================================== */
    /* 2-state .ib-min is the shared base for all mood themes (sea/sun/moon/sky/wood).
       'minimal' is kept in the group so nothing breaks before theme-loader switches to the
       new VALID/DEFAULT (Step 2); after that, data-theme is never 'minimal' (it falls back to sea). */
    body[data-theme="minimal"] .screen,
    body[data-theme="sea"] .screen,
    body[data-theme="sun"] .screen,
    body[data-theme="moon"] .screen,
    body[data-theme="sky"] .screen,
    body[data-theme="wood"] .screen { display: none; }
    .ib-min { display: none; }
    body[data-theme="minimal"] .ib-min,
    body[data-theme="sea"] .ib-min,
    body[data-theme="sun"] .ib-min,
    body[data-theme="moon"] .ib-min,
    body[data-theme="sky"] .ib-min,
    body[data-theme="wood"] .ib-min { display: block; }

    .ib-min {
      --ibm-indigo:#4f46e5; --ibm-indigo-600:#4338ca; --ibm-indigo-300:#a5b4fc;
      --ibm-indigo-100:#e0e7ff; --ibm-indigo-050:#eef2ff;
      --ibm-ink:#1e1b4b; --ibm-ink-soft:#4b4b6a; --ibm-paper:#f5f6ff;
      color:var(--ibm-ink); min-height:100vh;
      font-family:'Inter', system-ui, sans-serif;
      background:radial-gradient(120% 90% at 50% 30%, var(--ibm-indigo-050) 0%, var(--ibm-paper) 55%, #eceefb 100%);
    }
    /* ambient field — continuous indigo waves + drifting glow, behind everything */
    .ibm-ambient { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .ibm-glow { position:absolute; left:50%; top:34%; width:80vw; max-width:780px; aspect-ratio:1;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle, rgba(99,102,241,.16) 0%, rgba(99,102,241,.05) 40%, transparent 70%);
      animation:ibm-glowDrift 14s ease-in-out infinite; }
    @keyframes ibm-glowDrift { 0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:.9; } 50%{ transform:translate(-50%,-58%) scale(1.08); opacity:1; } }
    .ibm-waves { position:absolute; left:0; right:0; bottom:0; width:100%; height:62vh; min-height:420px; }
    .ibm-wave { transform-box:view-box; transform-origin:center bottom; }
    .ibm-wave--1 { fill:rgba(79,70,229,.10); animation:ibm-swell 9s ease-in-out infinite; }
    .ibm-wave--2 { fill:rgba(99,102,241,.08); animation:ibm-swell 12s ease-in-out infinite .8s; }
    .ibm-wave--3 { fill:rgba(129,120,245,.06); animation:ibm-swell 15s ease-in-out infinite 1.6s; }
    @keyframes ibm-swell { 0%,100%{ transform:translateY(14px) scaleY(.96); } 50%{ transform:translateY(-10px) scaleY(1.04); } }

    .ibm-stage { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:7vh 24px 9vh; text-align:center; }
    .ibm-view { display:none; width:100%; max-width:560px; }
    .ib-min[data-state="1"] #ib-view1 { display:flex; flex-direction:column; align-items:center; animation:ibm-rise .8s cubic-bezier(.16,.84,.44,1); }
    .ib-min[data-state="2"] #ib-view2 { display:flex; flex-direction:column; align-items:center; animation:ibm-rise .8s cubic-bezier(.16,.84,.44,1); }
    @keyframes ibm-rise { from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none; } }

    .ibm-host { font-family:'Space Grotesk', monospace; font-size:13px; letter-spacing:.02em; color:var(--ibm-ink-soft); margin-bottom:6vh; opacity:.8; }
    .ibm-host b { color:var(--ibm-indigo-600); font-weight:500; }

    .ibm-breath { position:relative; width:min(56vw,260px); aspect-ratio:1; margin-bottom:48px; }
    .ibm-breath svg { width:100%; height:100%; display:block; overflow:visible; position:relative; z-index:2; }
    .ibm-aura { position:absolute; top:50%; left:50%; width:88%; height:88%; transform:translate(-50%,-50%) scale(1);
      border-radius:50%; border:1.5px solid var(--ibm-indigo-300); opacity:0; z-index:1; }
    .ibm-aura.a1 { animation:ibm-aura 6s ease-out infinite; }
    .ibm-aura.a2 { animation:ibm-aura 6s ease-out infinite 2s; }
    .ibm-aura.a3 { animation:ibm-aura 6s ease-out infinite 4s; }
    @keyframes ibm-aura { 0%{ opacity:.5; transform:translate(-50%,-50%) scale(1);} 70%{ opacity:0; } 100%{ opacity:0; transform:translate(-50%,-50%) scale(1.5);} }
    .ibm-ring { transform-box:fill-box; transform-origin:center; animation:ibm-ringBreathe 6s ease-in-out infinite; }
    @keyframes ibm-ringBreathe { 0%,100%{ transform:scale(.93);} 50%{ transform:scale(1.0);} }
    .ibm-bar { transform-box:fill-box; transform-origin:center; animation:ibm-barBreathe 6s ease-in-out infinite; }
    .ibm-bar--2 { animation-delay:.12s; }
    @keyframes ibm-barBreathe { 0%,100%{ transform:scaleY(.82); opacity:.78;} 50%{ transform:scaleY(1.06); opacity:1;} }

    .ibm-q { font-family:'Inter', sans-serif; font-size:clamp(28px,5.2vw,42px); font-weight:300; line-height:1.18; letter-spacing:-.02em; color:var(--ibm-ink); margin-bottom:14px; white-space:nowrap; }
    .ibm-q em { font-family:'Fraunces', Georgia, serif; font-style:italic; font-weight:400; color:var(--ibm-indigo-600); }
    .ibm-whisper { font-family:'Fraunces', Georgia, serif; font-style:italic; font-weight:400; font-size:clamp(15px,2.4vw,18px); color:var(--ibm-ink-soft); opacity:.85; margin-bottom:44px; line-height:1.5; white-space:pre-line; }

    .ibm-actions { display:flex; gap:14px; align-items:center; flex-wrap:wrap; justify-content:center; }
    .ibm-btn { font-family:'Inter', sans-serif; font-size:16px; font-weight:500; border-radius:999px; padding:15px 30px; cursor:pointer; border:1.5px solid transparent; transition:transform .15s ease, box-shadow .2s ease, background .2s ease; min-width:220px; }
    .ibm-btn--primary { background:var(--ibm-indigo); color:#fff; box-shadow:0 8px 24px rgba(79,70,229,.28); }
    .ibm-btn--primary:hover { transform:translateY(-1px); box-shadow:0 12px 30px rgba(79,70,229,.36); }
    .ibm-btn--ghost { background:#fff; color:var(--ibm-indigo-600); border-color:var(--ibm-indigo-100); }
    .ibm-btn--ghost:hover { background:rgba(79,70,229,.06); }
    .ibm-btn:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }

    /* State 2 — session ended: smaller mark, reflection, stats */
    #ib-view2 .ibm-breath { width:min(44vw,180px); margin-bottom:34px; }
    .ibm-reflect-head { font-family:'Space Grotesk', monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--ibm-indigo); opacity:.75; margin-bottom:18px; }
    .ibm-reflect-title { font-family:'Inter', sans-serif; font-size:clamp(24px,4.4vw,34px); font-weight:300; letter-spacing:-.02em; color:var(--ibm-ink); margin-bottom:10px; line-height:1.22; }
    .ibm-reflect-sub { font-family:'Fraunces', Georgia, serif; font-style:italic; font-weight:400; font-size:clamp(15px,2.4vw,18px); color:var(--ibm-ink-soft); opacity:.85; margin-bottom:40px; max-width:34ch; }
    .ibm-stats { width:100%; background:rgba(255,255,255,.6); border:1px solid var(--ibm-indigo-100); border-radius:22px; padding:30px 28px; margin-bottom:38px; text-align:left; box-shadow:0 10px 40px rgba(79,70,229,.08); }
    .ibm-stats__row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:26px; gap:18px; }
    .ibm-stat__num { font-family:'Inter', sans-serif; font-size:34px; font-weight:300; color:var(--ibm-indigo-600); letter-spacing:-.02em; }
    .ibm-stat__num small { font-size:15px; color:var(--ibm-ink-soft); font-weight:400; margin-left:4px; }
    .ibm-stat__label { font-family:'Space Grotesk', monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ibm-ink-soft); margin-top:4px; }
    .ibm-spark__head { font-family:'Space Grotesk', monospace; font-size:11px; letter-spacing:.10em; text-transform:uppercase; color:var(--ibm-ink-soft); margin-bottom:14px; }
    .ibm-week { display:flex; align-items:flex-end; gap:8px; height:84px; }
    .ibm-day { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%; }
    .ibm-day__val { font-family:'Space Grotesk', monospace; font-size:12px; font-weight:500; color:var(--ibm-indigo-600); line-height:1; }
    .ibm-day__val.zero { color:var(--ibm-ink-soft); opacity:.4; }
    .ibm-day__bar { width:100%; max-width:26px; min-height:3px; background:linear-gradient(180deg,var(--ibm-indigo-300),var(--ibm-indigo)); border-radius:6px 6px 3px 3px; }
    .ibm-day__bar.zero { background:var(--ibm-indigo-100); }
    .ibm-day__lbl { font-family:'Space Grotesk', monospace; font-size:9px; color:var(--ibm-ink-soft); opacity:.7; }
    .ibm-more { width:100%; border-top:1px solid var(--ibm-indigo-100); margin-top:34px; }
    .ibm-more summary { list-style:none; cursor:pointer; padding:16px 2px; display:flex; align-items:center; gap:8px; font-family:'Space Grotesk', monospace; font-size:12px; letter-spacing:.04em; color:var(--ibm-ink-soft); }
    .ibm-more summary::-webkit-details-marker { display:none; }
    .ibm-more summary::before { content:'›'; color:var(--ibm-indigo); transition:transform .2s; font-size:16px; }
    .ibm-more details[open] summary::before { transform:rotate(90deg); }
    .ibm-more__body { padding:4px 2px 18px; text-align:left; }
    .ibm-more__item { display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid rgba(79,70,229,.08); font-size:14px; color:var(--ibm-ink-soft); }
    .ibm-more__item:last-child { border-bottom:none; }
    .ibm-more__item code { font-family:'Space Grotesk', monospace; color:var(--ibm-ink); }

    @media (max-width:560px) {
      .ibm-actions { flex-direction:column; width:100%; }
      .ibm-btn { width:100%; }
      .ibm-stats__row { flex-direction:column; gap:18px; }
      .ibm-q { white-space:normal; }
    }
    @media (prefers-reduced-motion:reduce) {
      .ibm-aura, .ibm-ring, .ibm-bar, .ibm-wave, .ibm-glow,
      .ibm-sun, .ibm-rays, .ibm-moon, .ibm-stars span, .ibm-cloud, .ibm-leaves span { animation:none !important; }
      .ibm-aura { opacity:.18; transform:translate(-50%,-50%) scale(1); }
      #ib-view1, #ib-view2 { animation:none !important; }
    }

    /* ===================== MOOD PALETTES (Step 3) — sea = .ib-min base, no override ===================== */
    /* breathing mark follows the palette (SVG markup has a hardcoded #4f46e5; CSS stroke/fill wins) */
    .ib-min .ibm-ring { stroke: var(--ibm-indigo); }
    .ib-min .ibm-bar { fill: var(--ibm-indigo); }

    /* SUN — amber sunrise */
    body[data-theme="sun"] .ib-min {
      --ibm-indigo:#e9883e; --ibm-indigo-600:#c2683a; --ibm-indigo-300:#e9a766;
      --ibm-indigo-100:#f3d9c2; --ibm-indigo-050:#fff2ec;
      --ibm-ink:#3d2b22; --ibm-ink-soft:#7a5c4d; --ibm-paper:#fff2ec;
      background:linear-gradient(180deg, #e8edf5 0%, #eee9f1 26%, #f6e8ee 48%, #fce6db 68%, #f9cda6 86%, #f4b88a 100%);
    }
    /* SKY — blue open air */
    body[data-theme="sky"] .ib-min {
      --ibm-indigo:#3f87c8; --ibm-indigo-600:#2e6da3; --ibm-indigo-300:#7fb0db;
      --ibm-indigo-100:#d2e6f5; --ibm-indigo-050:#eaf5fc;
      --ibm-ink:#1c3346; --ibm-ink-soft:#3a5d76; --ibm-paper:#eaf5fc;
      background:linear-gradient(180deg, #acd4f0 0%, #cfe7f7 45%, #eaf5fc 100%);
    }
    /* WOOD — green forest */
    body[data-theme="wood"] .ib-min {
      --ibm-indigo:#6f7a4e; --ibm-indigo-600:#5c6640; --ibm-indigo-300:#9aa078;
      --ibm-indigo-100:#dcdec5; --ibm-indigo-050:#eef0e0;
      --ibm-ink:#33371f; --ibm-ink-soft:#4e533a; --ibm-paper:#e6e2d2;
      background:linear-gradient(180deg, #e8e3d0 0%, #ddd8c0 50%, #e6e2d2 100%);
    }
    /* MOON — dark moonlight. Individual handling: light mark/text on dark bg; dark stats box for State 2. */
    body[data-theme="moon"] .ib-min {
      --ibm-indigo:#6366f1; --ibm-indigo-600:#4338ca; --ibm-indigo-300:#a5b4fc;
      --ibm-indigo-100:#3a3f6b; --ibm-indigo-050:#1b1f40;
      --ibm-ink:#ecedff; --ibm-ink-soft:#c3c5e8; --ibm-paper:#0a0b1a;
      background:radial-gradient(130% 90% at 50% 20%, #1b1f40, #0a0b1a 65%);
    }
    body[data-theme="moon"] .ib-min .ibm-ring { stroke:#a5b4fc; }
    body[data-theme="moon"] .ib-min .ibm-bar { fill:#a5b4fc; }
    body[data-theme="moon"] .ib-min .ibm-q em { color:#a5b4fc; }
    /* moon State 2: dark translucent stats box + light numbers (prototype specced State 1 only) */
    body[data-theme="moon"] .ib-min .ibm-stats { background:rgba(30,33,70,.5); border-color:rgba(165,180,252,.22); box-shadow:none; }
    body[data-theme="moon"] .ib-min .ibm-stat__num,
    body[data-theme="moon"] .ib-min .ibm-day__val { color:#c7cbff; }

    /* ===================== MOOD MOTIFS (Step 4) — CSS-gated per data-theme ===================== */
    /* sea uses .ibm-ambient (indigo waves); gate it to sea/minimal so other moods don't show it */
    .ib-min .ibm-ambient { display:none; }
    body[data-theme="sea"] .ib-min .ibm-ambient,
    body[data-theme="minimal"] .ib-min .ibm-ambient { display:block; }
    /* shared motif layer (behind .ibm-stage which is z-index:2) */
    .ib-min .ibm-motif { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; display:none; }
    body[data-theme="sun"] .ib-min .ibm-motif--sun,
    body[data-theme="moon"] .ib-min .ibm-motif--moon,
    body[data-theme="sky"] .ib-min .ibm-motif--sky,
    body[data-theme="wood"] .ib-min .ibm-motif--wood { display:block; }

    /* SUN — rising sun + slow rays */
    .ibm-sun { position:absolute; bottom:-94vh; left:50%; transform:translateX(-50%); width:110vh; height:110vh; border-radius:50%; z-index:1;
      background:radial-gradient(circle, rgba(255,214,150,.98) 0%, rgba(255,201,118,.82) 60%, rgba(255,197,112,.5) 86%, rgba(255,197,112,0) 100%);
      filter:blur(4px); box-shadow:0 0 120px rgba(255,200,120,.40), 0 0 220px rgba(255,185,100,.24); /* defined-but-soft body + warm halo */
      animation:ibm-sunGlow 6s ease-in-out infinite; }
    @keyframes ibm-sunGlow { 0%,100%{ transform:translateX(-50%) scale(.97); opacity:.9; } 50%{ transform:translateX(-50%) scale(1.04); opacity:1; } }
    .ibm-rays { position:absolute; bottom:-158vh; left:50%; transform:translateX(-50%); width:170vh; height:170vh; z-index:0; opacity:.35;
      background:conic-gradient(from 0deg, transparent 0deg, rgba(255,200,130,.22) 12deg, transparent 24deg, rgba(255,200,130,.22) 36deg, transparent 48deg, rgba(255,200,130,.22) 60deg, transparent 72deg, rgba(255,200,130,.22) 84deg, transparent 96deg, rgba(255,200,130,.22) 108deg, transparent 120deg, rgba(255,200,130,.22) 132deg, transparent 144deg, rgba(255,200,130,.22) 156deg, transparent 168deg, rgba(255,200,130,.22) 180deg);
      -webkit-mask:radial-gradient(circle, #000 30%, transparent 68%); mask:radial-gradient(circle, #000 30%, transparent 68%);
      animation:ibm-rayspin 60s linear infinite; }
    @keyframes ibm-rayspin { 0%{ transform:translateX(-50%) rotate(0); } 100%{ transform:translateX(-50%) rotate(360deg); } }

    /* MOON — rising moon + twinkling stars */
    .ibm-moon { position:absolute; bottom:-90vh; left:50%; transform:translateX(-50%); width:104vh; height:104vh; border-radius:50%; z-index:1;
      background:radial-gradient(circle at 45% 42%, rgba(253,251,233,.92) 0%, rgba(240,238,212,.7) 48%, rgba(220,218,192,.35) 78%, rgba(220,218,192,0) 100%);
      filter:blur(6px); box-shadow:0 0 90px rgba(253,251,233,.30), 0 0 160px rgba(165,180,252,.20);
      animation:ibm-moonGlow 7s ease-in-out infinite; }
    @keyframes ibm-moonGlow { 0%,100%{ transform:translateX(-50%) scale(.99); opacity:.88; } 50%{ transform:translateX(-50%) scale(1.03); opacity:1; } }
    .ibm-stars span { position:absolute; width:2.5px; height:2.5px; background:#fff; border-radius:50%; z-index:1; animation:ibm-twinkle 4s ease-in-out infinite; }
    .ibm-stars span:nth-child(1){ top:20%; left:18%; animation-delay:0s; }
    .ibm-stars span:nth-child(2){ top:30%; left:72%; animation-delay:1.1s; }
    .ibm-stars span:nth-child(3){ top:15%; left:48%; animation-delay:.6s; width:2px; height:2px; }
    .ibm-stars span:nth-child(4){ top:42%; left:26%; animation-delay:2.2s; }
    .ibm-stars span:nth-child(5){ top:24%; left:84%; animation-delay:1.6s; width:2px; height:2px; }
    .ibm-stars span:nth-child(6){ top:38%; left:10%; animation-delay:3s; }
    .ibm-stars span:nth-child(7){ top:12%; left:62%; animation-delay:2.6s; width:2px; height:2px; }
    .ibm-stars span:nth-child(8){ top:46%; left:58%; animation-delay:.9s; }
    .ibm-stars span:nth-child(9){ top:18%; left:34%; animation-delay:3.4s; width:2px; height:2px; }
    .ibm-stars span:nth-child(10){ top:33%; left:90%; animation-delay:1.4s; }
    @keyframes ibm-twinkle { 0%,100%{ opacity:.2; transform:scale(.8); } 50%{ opacity:1; transform:scale(1.1); } }

    /* SKY — drifting clouds */
    .ibm-cloud { position:absolute; background:#fff; border-radius:50%; filter:blur(2px); }
    .ibm-c1{ width:92px; height:92px; top:12%; left:-32%; box-shadow:52px 12px 0 -8px #fff, 104px 22px 0 -16px #fff, -42px 16px 0 -12px #fff; opacity:.92; animation:ibm-cloudDrift 28s linear infinite; }
    .ibm-c2{ width:64px; height:64px; top:34%; left:-28%; box-shadow:40px 10px 0 -6px #fff, 80px 18px 0 -12px #fff; opacity:.78; animation:ibm-cloudDrift 38s linear infinite; animation-delay:-20s; }
    .ibm-c3{ width:78px; height:78px; top:54%; left:-34%; box-shadow:46px 12px 0 -7px #fff, 92px 20px 0 -14px #fff, -38px 14px 0 -12px #fff; opacity:.7; animation:ibm-cloudDrift 32s linear infinite; animation-delay:-12s; }
    .ibm-c4{ width:104px; height:104px; top:24%; left:-36%; box-shadow:58px 14px 0 -9px #fff, 116px 24px 0 -17px #fff, -46px 18px 0 -14px #fff; opacity:.85; animation:ibm-cloudDrift 24s linear infinite; animation-delay:-6s; }
    .ibm-c5{ width:56px; height:56px; top:72%; left:-26%; box-shadow:34px 8px 0 -5px #fff, 68px 16px 0 -11px #fff; opacity:.62; animation:ibm-cloudDrift 36s linear infinite; animation-delay:-28s; }
    @keyframes ibm-cloudDrift { 0%{ transform:translateX(0); } 100%{ transform:translateX(120vw); } }

    /* WOOD — canopy light + hazy mountains + falling leaves */
    .ibm-canopy { position:absolute; inset:0; z-index:0; opacity:.5;
      background:radial-gradient(40% 30% at 25% 12%, rgba(150,170,90,.30), transparent 60%), radial-gradient(35% 28% at 78% 8%, rgba(150,170,90,.22), transparent 60%); }
    .ibm-mtns { position:absolute; left:0; right:0; bottom:0; height:38%; z-index:1; opacity:.55; filter:blur(2px);
      -webkit-mask:linear-gradient(180deg, transparent, #000 42%); mask:linear-gradient(180deg, transparent, #000 42%); }
    .ibm-mtns svg { position:absolute; bottom:0; width:100%; height:100%; display:block; }
    .ibm-m-far { fill:#b5b994; }
    .ibm-m-mid { fill:#9aa078; }
    .ibm-leaves span { position:absolute; top:-24px; width:11px; height:11px; z-index:2; background:#7c8a4e; border-radius:0 100% 0 100%; opacity:.8; animation:ibm-fall linear infinite; }
    .ibm-leaves span:nth-child(1){ left:18%; animation-duration:9s; animation-delay:0s; background:#7c8a4e; }
    .ibm-leaves span:nth-child(2){ left:42%; animation-duration:12s; animation-delay:2s; background:#94a05a; }
    .ibm-leaves span:nth-child(3){ left:66%; animation-duration:10s; animation-delay:1s; background:#8a7c42; }
    .ibm-leaves span:nth-child(4){ left:80%; animation-duration:13s; animation-delay:4s; background:#7c8a4e; }
    .ibm-leaves span:nth-child(5){ left:30%; animation-duration:11s; animation-delay:6s; background:#94a05a; }
    @keyframes ibm-fall { 0%{ transform:translateY(0) rotate(0); opacity:0; } 10%{ opacity:.8; } 88%{ opacity:.8; } 100%{ transform:translateY(80vh) rotate(220deg); opacity:0; } }
  </style>
</head>
<body data-theme="minimal">
  <div class="screen">
    <div class="layout">

      <!-- top rule (shown only in bold/focus) -->
      <div class="top-rule">
        <span><span class="accent-dot"><span class="dot" style="width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle;"></span></span>IMPULSEBLOCK</span>
        <span>INTERRUPT BEFORE IMPULSE</span>
      </div>

      <!-- per-theme column grid: 2 columns (bold/focus) or 3 columns (minimal/calm/zen).
           Same DOM for all themes; CSS grid-template-areas place each zone per theme.
           .data-col is a grouped column for 2-col themes (display:flex) and dissolves
           (display:contents) for 3-col themes so its zones become independent columns. -->
      <div class="grid">

        <!-- Calm-only mascot: placed via grid-area into the centered top, BETWEEN the host
             chip and the headline. display:none in every other theme. Separate from #cheer-image. -->
        <img class="calm-character" src="assets/calm-character.png" alt="" />

        <!-- spine column: headline (top) + image + buttons.
             2-col themes: left flex column. 3-col themes: dissolves (display:contents) so the
             headline spans the centered top row and image+buttons become the center column. -->
        <div class="spine-col">
          <div class="zone zone-head">
            <h1 class="headline" data-i18n="blocked_confirm"></h1>
            <p class="sub" data-i18n="blocked_title"></p>
          </div>
          <div class="zone zone-spine">
            <div class="cheer"><img id="cheer-image" src="assets/taero_en.png" alt="" /></div>
            <div class="actions">
              <button type="button" class="btn" id="btn-yes" data-i18n="allow_5min"></button>
              <button type="button" class="btn" id="btn-no" data-i18n="btn_stop"></button>
            </div>
          </div>
        </div>

        <!-- data: one right column for 2-col themes; for 3-col, chip spans the top, blocked goes
             left, and .rightcol (stats + log) is the right column. -->
        <div class="data-col">

          <!-- current host -->
          <div class="zone zone-chip">
            <span class="domain-chip"><span class="dot"></span><span id="current-host">—</span></span>
          </div>

          <!-- stats + 7-day log grouped (one right column in 3-col) -->
          <div class="rightcol">
            <!-- today count / last opened (blocked.js fills these) -->
            <div class="zone zone-stats">
              <div class="insight stats">
                <p id="today-count">—</p>
                <p id="last-opened">—</p>
              </div>
            </div>

            <!-- 7-day chart + recent bursts -->
            <div class="zone zone-log">
              <details class="details" open>
                <summary data-i18n="impulse_log"></summary>
                <div class="details-body">
                  <p class="history-title" data-i18n="impulse_log_7d"></p>
                  <div id="history-list"></div>

                  <p class="history-title" data-i18n="recent_bursts"></p>
                  <div id="bursts-list"></div>
                </div>
              </details>
            </div>
          </div>

          <!-- blocked sites (with delete buttons) -->
          <div class="zone zone-blocked">
            <p class="history-title" data-i18n="blocked_sites"></p>
            <div id="blocked-list"></div>
          </div>

        </div>

      </div>

      <!-- enso overlay (zen only) -->
      <div class="enso"></div>

      <!-- incognito help, quiet at bottom -->
      <section class="incognito">
        <h2 data-i18n="incognito_title"></h2>
        <p data-i18n="incognito_intro"></p>
        <ol>
          <li data-i18n="incognito_step1"></li>
          <li data-i18n="incognito_step2"></li>
        </ol>
        <p><a href="https://support.google.com/chrome/answer/95464" target="_blank" rel="noopener" data-i18n="incognito_help"></a></p>
      </section>

    </div>
  </div>

  <!-- ===== minimal theme: 2-state redesign. Shown only when data-theme="minimal";
       the grid .screen above stays in the DOM (ids preserved) but is hidden for minimal.
       State 1 (#ib-view1) vs State 2 (#ib-view2) chosen by blocked.js from ladderIndex. ===== -->
  <div class="ib-min" id="ib-min" data-state="1">
    <div class="ibm-ambient" aria-hidden="true">
      <div class="ibm-glow"></div>
      <svg class="ibm-waves" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <path class="ibm-wave ibm-wave--3" d="M0 720 Q 360 660 720 720 T 1440 720 V900 H0 Z"/>
        <path class="ibm-wave ibm-wave--2" d="M0 780 Q 360 720 720 780 T 1440 780 V900 H0 Z"/>
        <path class="ibm-wave ibm-wave--1" d="M0 830 Q 360 780 720 830 T 1440 830 V900 H0 Z"/>
      </svg>
    </div>

    <!-- per-mood motifs (Step 4); CSS-gated by data-theme. sea uses .ibm-ambient (waves) above. -->
    <div class="ibm-motif ibm-motif--sun" aria-hidden="true"><div class="ibm-rays"></div><div class="ibm-sun"></div></div>
    <div class="ibm-motif ibm-motif--moon" aria-hidden="true"><div class="ibm-moon"></div><div class="ibm-stars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
    <div class="ibm-motif ibm-motif--sky" aria-hidden="true"><div class="ibm-cloud ibm-c1"></div><div class="ibm-cloud ibm-c2"></div><div class="ibm-cloud ibm-c3"></div><div class="ibm-cloud ibm-c4"></div><div class="ibm-cloud ibm-c5"></div></div>
    <div class="ibm-motif ibm-motif--wood" aria-hidden="true"><div class="ibm-canopy"></div><div class="ibm-mtns"><svg viewBox="0 0 400 160" preserveAspectRatio="none"><path class="ibm-m-far" d="M0,160 L0,96 L70,52 L130,90 L200,40 L270,84 L340,48 L400,88 L400,160 Z"/><path class="ibm-m-mid" d="M0,160 L0,120 L60,86 L120,116 L190,74 L260,110 L330,80 L400,114 L400,160 Z"/></svg></div><div class="ibm-leaves"><span></span><span></span><span></span><span></span><span></span></div></div>

    <div class="ibm-stage">
      <!-- STATE 1 — the pause moment (minimal, no stats) -->
      <section class="ibm-view" id="ib-view1">
        <div class="ibm-host"><span data-i18n="ib_pausing"></span>&nbsp;<b id="ib-host"></b></div>
        <div class="ibm-breath" aria-hidden="true">
          <div class="ibm-aura a1"></div><div class="ibm-aura a2"></div><div class="ibm-aura a3"></div>
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle class="ibm-ring" cx="100" cy="100" r="88" stroke="#4f46e5" stroke-width="2"/>
            <rect class="ibm-bar ibm-bar--1" x="84"  y="62" width="13" height="76" rx="6.5" fill="#4f46e5"/>
            <rect class="ibm-bar ibm-bar--2" x="103" y="62" width="13" height="76" rx="6.5" fill="#4f46e5"/>
          </svg>
        </div>
        <h1 class="ibm-q" data-i18n="blocked_confirm"></h1>
        <p class="ibm-whisper" data-i18n="ib_whisper_pause"></p>
        <div class="ibm-actions">
          <button type="button" class="ibm-btn ibm-btn--primary" id="ib-stop" data-i18n="btn_stop"></button>
          <button type="button" class="ibm-btn ibm-btn--ghost" id="ib-allow" data-i18n="allow_5min"></button>
        </div>
      </section>

      <!-- STATE 2 — session ended: reflection + stats -->
      <section class="ibm-view" id="ib-view2">
        <div class="ibm-breath" aria-hidden="true">
          <div class="ibm-aura a1"></div><div class="ibm-aura a2"></div>
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle class="ibm-ring" cx="100" cy="100" r="88" stroke="#4f46e5" stroke-width="2"/>
            <rect class="ibm-bar ibm-bar--1" x="84"  y="62" width="13" height="76" rx="6.5" fill="#4f46e5"/>
            <rect class="ibm-bar ibm-bar--2" x="103" y="62" width="13" height="76" rx="6.5" fill="#4f46e5"/>
          </svg>
        </div>
        <div class="ibm-reflect-head" data-i18n="ib_session_over"></div>
        <h2 class="ibm-reflect-title" data-i18n="ib_session_q"></h2>
        <p class="ibm-reflect-sub" data-i18n="ib_reflect_sub"></p>

        <div class="ibm-stats">
          <div class="ibm-stats__row">
            <div>
              <div class="ibm-stat__num"><span id="ib-count">0</span> <small id="ib-count-unit"></small></div>
              <div class="ibm-stat__label" data-i18n="ib_stat_opened"></div>
            </div>
            <div>
              <div class="ibm-stat__num"><span id="ib-burst">0</span> <small id="ib-burst-unit"></small></div>
              <div class="ibm-stat__label" data-i18n="ib_stat_burst"></div>
            </div>
          </div>
          <div class="ibm-spark">
            <div class="ibm-spark__head" data-i18n="ib_week_head"></div>
            <div class="ibm-week" id="ib-week"></div>
          </div>
        </div>

        <div class="ibm-actions">
          <button type="button" class="ibm-btn ibm-btn--primary" id="ib-letgo" data-i18n="btn_let_go"></button>
          <button type="button" class="ibm-btn ibm-btn--ghost" id="ib-continue" data-i18n="btn_continue"></button>
        </div>

        <div class="ibm-more">
          <details>
            <summary data-i18n="recent_bursts"></summary>
            <div class="ibm-more__body" id="ib-more-body"></div>
          </details>
        </div>
      </section>
    </div>
  </div>

  <script src="block-core.js"></script>
  <script src="theme-loader.js"></script>
  <script src="blocked-i18n.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
