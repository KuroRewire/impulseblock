<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseBlock</title>
  <style>
    /* D: lightweight popup polish — system fonts only, no external resources. */
    :root {
      --accent: #4f46e5; --accent-hover: #4338ca;
      --ink: #1f2330; --muted: #6b7280;
      --line: #e6e7eb; --line-soft: #f1f1f4; --bg-soft: #f7f7f9;
    }
    * { box-sizing: border-box; }
    body {
      width: 280px; padding: 14px; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: #fff; -webkit-font-smoothing: antialiased;
    }
    h2 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 10px 0; }

    /* button base + main actions */
    button { font-family: inherit; cursor: pointer; border: 1px solid transparent; border-radius: 8px;
      transition: background .15s ease, border-color .15s ease, color .15s ease; }
    #block-btn { width: 100%; padding: 10px 12px; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; }
    #block-btn:hover { background: var(--accent-hover); }
    #force-block-btn { width: 100%; padding: 9px 12px; font-size: 13px; font-weight: 600; margin-top: 8px;
      background: #fff; color: var(--ink); border-color: var(--line); }
    #force-block-btn:hover { background: var(--bg-soft); border-color: #d6d8de; }
    #status { font-size: 12px; color: var(--muted); margin: 8px 0 0 0; }

    .section-title { margin: 16px 0 6px 0; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted); }

    #blocked-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; padding: 2px 8px; }
    .blocked-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px;
      padding: 5px 0; border-bottom: 1px solid var(--line-soft); }
    .blocked-item:last-child { border-bottom: none; }
    .blocked-host { flex: 1; margin-right: 8px; word-break: break-all; color: var(--ink); }
    .btn-small { width: auto; padding: 3px 9px; font-size: 11px; font-weight: 600;
      background: #fff; color: var(--muted); border: 1px solid var(--line); border-radius: 6px; }
    .btn-small:hover { background: var(--bg-soft); color: var(--ink); }

    /* F3: block-screen theme picker */
    .theme-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .theme-swatch { width: auto; flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px; font-size: 12px; line-height: 1; border: 1px solid var(--line); border-radius: 8px;
      background: #fff; color: var(--ink); }
    .theme-swatch:hover { background: var(--bg-soft); border-color: #d0d2da; }
    .theme-swatch .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex: 0 0 auto;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06); }
    .theme-swatch.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); font-weight: 600; }

    /* F4: pause image */
    .image-row { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
    .image-preview { width: 56px; height: 56px; border-radius: 8px; border: 1px solid var(--line);
      object-fit: cover; background: var(--bg-soft); flex: 0 0 auto; }
    .image-controls { flex: 1; min-width: 0; }
    .image-controls input[type="file"] { width: 100%; font-size: 11px; color: var(--muted); }
    .btn-reset { width: auto; padding: 5px 10px; font-size: 11px; font-weight: 600; margin-top: 8px;
      background: #fff; color: var(--muted); border: 1px solid var(--line); border-radius: 6px; }
    .btn-reset:hover { background: var(--bg-soft); color: var(--ink); }
    #pause-image-status { font-size: 11px; color: #c0392b; margin: 6px 0 0 0; }

    /* subtle, factual plan indicator (Free · N/5 · / Pro · unlimited / Unlimited) */
    .plan-status { font-size: 11px; color: var(--muted); margin: 6px 0 0 0; }
    /* subtle restore-purchase link (FIX 5) */
    .restore-link { display: inline-block; margin-top: 4px; font-size: 11px; color: var(--muted); text-decoration: underline; cursor: pointer; }
    .restore-link:hover { color: var(--ink); }

    /* free-cap dialog — neutral, three equal options, no dark pattern */
    .cap-dialog { margin: 10px 0 0 0; padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--bg-soft); }
    .cap-dialog .cap-title { font-size: 13px; font-weight: 700; margin: 0 0 6px 0; color: var(--ink); }
    .cap-dialog .cap-body { font-size: 12px; line-height: 1.5; margin: 0 0 10px 0; color: var(--muted); }
    .cap-actions { display: flex; flex-direction: column; gap: 6px; }
    .cap-actions button { width: 100%; padding: 8px 10px; font-size: 12px; font-weight: 600; border-radius: 7px;
      background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .cap-actions button:hover { background: var(--bg-soft); border-color: #d0d2da; }
    .cap-replace-hint { font-size: 11px; color: var(--muted); margin: 12px 0 6px 0; }
    .cap-replace-list { display: flex; flex-direction: column; gap: 4px; }
    .cap-replace-list button { width: 100%; text-align: left; padding: 6px 8px; font-size: 12px; font-weight: 500;
      background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: 6px; word-break: break-all; }
    .cap-replace-list button:hover { background: var(--bg-soft); border-color: var(--accent); }
  </style>
</head>
<body>
  <h2 data-i18n="extName"></h2>
  <button id="block-btn" data-i18n="popup_block_this_site"></button>
  <p id="status"></p>

  <!-- Free 5-site cap dialog: hidden until a free, non-grandfathered, non-Pro user adds a 6th
       site. Three EQUAL, neutral options (no dark pattern, no guilt). Populated by popup-i18n. -->
  <div id="cap-dialog" class="cap-dialog" hidden>
    <p class="cap-title" data-i18n="popup_cap_title"></p>
    <p class="cap-body" data-i18n="popup_cap_body"></p>
    <div class="cap-actions">
      <button type="button" id="cap-replace" data-i18n="popup_cap_replace"></button>
      <button type="button" id="cap-keep" data-i18n="popup_cap_keep"></button>
      <button type="button" id="cap-upgrade" data-i18n="popup_cap_upgrade"></button>
    </div>
    <p class="cap-replace-hint" id="cap-replace-hint" data-i18n="popup_cap_replace_hint" hidden></p>
    <div id="cap-replace-list" class="cap-replace-list" hidden></div>
  </div>

  <!-- "Couldn't verify your plan" dialog (FIX 1b): shown when entitlement can't be confirmed at the
       6th site and the user isn't a known prior purchaser. Neutral: retry / restore / upgrade. -->
  <div id="verify-dialog" class="cap-dialog" hidden>
    <p class="cap-title" data-i18n="popup_verify_title"></p>
    <p class="cap-body" data-i18n="popup_verify_body"></p>
    <div class="cap-actions">
      <button type="button" id="verify-retry" data-i18n="popup_verify_retry"></button>
      <button type="button" id="verify-restore" data-i18n="popup_verify_restore"></button>
      <button type="button" id="verify-upgrade" data-i18n="popup_cap_upgrade"></button>
    </div>
  </div>

  <button id="force-block-btn" data-i18n="popup_force_block_tab"></button>

  <p class="section-title" data-i18n="blocked_sites"></p>
  <div id="blocked-list"></div>
  <p id="plan-status" class="plan-status"></p>
  <a href="#" id="restore-link" class="restore-link" data-i18n="popup_restore_link"></a>

  <!-- F3: block-screen theme picker (populated by popup.js) -->
  <p class="section-title" data-i18n="popup_theme_label"></p>
  <div id="theme-grid" class="theme-grid"></div>

  <!-- F4: custom pause image -->
  <p class="section-title" data-i18n="popup_image_label"></p>
  <div class="image-row">
    <img id="pause-image-preview" class="image-preview" alt="" />
    <div class="image-controls">
      <input type="file" id="pause-image-input" accept="image/*" />
      <button type="button" id="pause-image-reset" class="btn-reset" data-i18n="popup_image_reset"></button>
    </div>
  </div>
  <p id="pause-image-status"></p>

  <script src="block-core.js"></script>
  <script src="popup-i18n.js"></script>
  <script src="ExtPay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
